name: gce_practicals_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  percent_indicator: ^4.2.4
  path_provider: ^2.1.5
  flutter_charts: ^0.5.2
  fl_chart: ^1.0.0
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  firebase_storage: ^13.0.0
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  share_plus: ^11.1.0
  dio: ^5.9.0
  screenshot: ^3.0.0
  just_audio: ^0.10.4
  http: ^1.5.0
  firebase_messaging: ^16.0.1
  smooth_page_indicator: ^1.2.1
  cached_network_image: ^3.4.1
  image_picker: ^1.2.0
  permission_handler: ^12.0.1
  pdfx: ^2.9.2
  flutter_local_notifications: ^19.5.0
  material_symbols_icons: ^4.2906.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  change_app_package_name: ^1.5.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/practicals_logo.png"
  adaptive_icon_foreground: "assets/images/practicals_logo.png"
  adaptive_icon_background: "#272A50"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/practicals_logo.png
    - assets/images/coin.png
    - assets/images/Ict.png
    - assets/images/Computer.png
    - assets/images/Csc.png
    - assets/images/Biology.png
    - assets/images/Chemistry.png
    - assets/images/Physics.png

  fonts:
  - family: GoogleSansFlex
    fonts:
      - asset: assets/fonts/GoogleSansFlex_36pt-Regular.ttf
        weight: 400
      - asset: assets/fonts/GoogleSansFlex_36pt-Medium.ttf
        weight: 500
      - asset: assets/fonts/GoogleSansFlex_36pt-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/GoogleSansFlex_36pt-Bold.ttf
        weight: 700
      - asset: assets/fonts/GoogleSansFlex_36pt-Light.ttf
        weight: 300